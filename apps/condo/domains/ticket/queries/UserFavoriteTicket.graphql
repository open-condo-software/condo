query getUserFavoriteTickets ($userId: ID!, $ticketWhere: TicketWhereInput, $first: Int = 500) {
    userFavoriteTickets: allUserFavoriteTickets(
        where: {
            user: { id: $userId },
            ticket: $ticketWhere
        },
        first: $first
    ) {
        id
        ticket { id }
    }

    meta: _allUserFavoriteTicketsMeta(where: {
        user: { id: $userId },
        ticket: $ticketWhere
    }) {
        count
    }
}