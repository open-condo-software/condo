query getTicketCommentsFiles ($ticketCommentsIds: [ID!]!) {
    files: allTicketCommentFiles (
        where: {
            ticketComment: { id_in: $ticketCommentsIds }
        },
        first: 100,
        sortBy: [createdAt_DESC],
    ) {
        id
        file {
            originalFilename
            mimetype
            publicUrl
        }
        ticketComment {
            id
        }
    }
}

mutation createTicketCommentFile($data: TicketCommentFileCreateInput!) {
    ticketCommentFile: createTicketCommentFile(data: $data) {
        id
        ticketComment { id }
        ticket { id }
        file {
            id
            originalFilename
            publicUrl
            mimetype
        }
    }
}
