query getTicketFiles($ticketId: ID!) {
    ticketFiles: allTicketFiles (
        where: {
            ticket: {
                id: $ticketId,
            },
        },
        sortBy: [createdAt_ASC],
        first: 100,
    ) {
        id
        ticket {
            id
        }
        file {
            id
            originalFilename
            publicUrl
        }
    }
}

mutation createTicketFile($data: TicketFileCreateInput!) {
    ticketFile: createTicketFile(data: $data) {
        id
        ticket { id }
        file {
            id
            originalFilename
            publicUrl
            mimetype
        }
    }
}
