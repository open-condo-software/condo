query getOrganizationActivatedSubscriptions($organizationId: ID!) {
    activatedSubscriptions: allSubscriptionContexts(
        where: {
            organization: { id: $organizationId }
            status: DONE
        }
        sortBy: [createdAt_DESC]
        first: 100
    ) {
        id
        subscriptionPlan {
            id
            name
            priority
        }
        isTrial
        startAt
        endAt
        bindingId
        frozenPaymentInfo {
            paymentMethod { bindingId paymentSystem cardNumber expiration bankName bankCountryCode }
            invoice { id rows { name count price toPay } toPay }
            pricingRuleId
        }
    }
}

query getOrganizationTrialSubscriptions($organizationId: ID!) {
    trialSubscriptions: allSubscriptionContexts(
        where: {
            organization: { id: $organizationId }
            isTrial: true
            status: DONE
        }
        sortBy: [createdAt_DESC]
        first: 100
    ) {
        id
        subscriptionPlan {
            id
            name
        }
        isTrial
        startAt
        daysRemaining
        endAt
        createdAt
        bindingId
        frozenPaymentInfo {
            paymentMethod { bindingId paymentSystem cardNumber expiration bankName bankCountryCode }
            invoice { id rows { name count price toPay } toPay }
            pricingRuleId
        }
    }
}

query getLastExpiredSubscriptionContext($organizationId: ID!, $now: String!) {
    lastExpiredContext: allSubscriptionContexts(
        where: {
            organization: { id: $organizationId }
            endAt_lte: $now
            status: DONE
        }
        sortBy: [endAt_DESC]
        first: 1
    ) {
        id
        subscriptionPlan {
            id
            name
        }
        isTrial
        startAt
        endAt
        bindingId
        frozenPaymentInfo {
            paymentMethod { bindingId paymentSystem cardNumber expiration bankName bankCountryCode }
            invoice { id rows { name count price toPay } toPay }
            pricingRuleId
        }
    }
}

query getSubscriptionContextById($id: ID!) {
    subscriptionContext: SubscriptionContext(where: { id: $id }) {
        id
        subscriptionPlan {
            id
            name
            priority
            canBePromoted
        }
        isTrial
        startAt
        endAt
        daysRemaining
        bindingId
        frozenPaymentInfo {
            paymentMethod { bindingId paymentSystem cardNumber expiration bankName bankCountryCode }
            invoice { id rows { name count price toPay } toPay }
            pricingRuleId
        }
    }
}

query getOrganizationSubscriptionContextsWithPaymentMethods($organizationId: ID!) {
    subscriptionContexts: allSubscriptionContexts(
        where: {
            organization: { id: $organizationId }
            bindingId_not: null
            status: DONE
        }
        sortBy: [endAt_DESC]
        first: 100
    ) {
        id
        bindingId
        endAt
        frozenPaymentInfo {
            paymentMethod {
                bindingId
                paymentSystem
                cardNumber
                expiration
                bankName
                bankCountryCode
            }
        }
    }
}

mutation updateSubscriptionContextPaymentMethod($data: UpdateSubscriptionContextPaymentMethodInput!) {
    result: updateSubscriptionContextPaymentMethod(data: $data) {
        id
    }
}