query getOrganizationEmployeeById($id: ID!) {
    employee: allOrganizationEmployees(where: { id: $id }) {
        organization {
            country
            name
            type
            description
            avatar { publicUrl }
            meta
            tin
            features
            statusTransitions
            defaultEmployeeRoleStatusTransitions
            importId
            importRemoteSystem
            phone
            phoneNumberPrefix
            isApproved
            id
            dv
            sender { dv fingerprint }
            v
            deletedAt
            newId
            createdBy { id name }
            updatedBy { id name }
            createdAt
            updatedAt
        }
        user { id name }
