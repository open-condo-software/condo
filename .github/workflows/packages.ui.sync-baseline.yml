name: Chromatic sync baseline

on:
  push:
    branches:
      - main
    paths:
      - 'packages/ui/src/**'

jobs:
  chromatic:
    runs-on: ubuntu-22.04
    env:
      NPM_ALWAYS_AUTH: false
      NPM_CONFIG_REGISTRY: ${{ secrets.NPM_REGISTRY_SERVER }}
      NPM_REGISTRY_SERVER: ${{ secrets.NPM_REGISTRY_SERVER }}

    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          ssh-key: ${{ secrets.SSH_DOCK_SERVER_PRIVATE_KEY }}

      - name: Install packages
        run: |
          npm i -g turbo
          yarn install --immutable

      - name: Publish chromatic build
        uses: chromaui/action@v1
        with:
          workingDir: packages/ui
          projectToken: ${{ secrets.UI_CHROMATIC_PROJECT_TOKEN }}
          buildScriptName: "build:chromatic"
          # Auto-accepting build as a baseline
          autoAcceptChanges: true
